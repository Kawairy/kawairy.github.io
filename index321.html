<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Две кнопки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .button-container {
            display: flex;
            gap: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="button-container">
    <button onclick="window.location.href='https://kawairy.github.io/index2.html'">Перейти на kawairy.github.io</button>
    <button onclick="window.location.href='https://www.sberbank.com/sms/adskids'">Перейти на Сбербанк</button>
     <button onclick="window.location.href='https://www.sberbank.com/sms/adskids'" target="_blank" tabindex="0" >Перейти на Сбербанк "target blanc" </button>
    <button onclick="window.location.href='https://www.sberbank.com/sms/adskids'" target="_blank" tabindex="-1" >Перейти на Сбербанк "target blanc -1" </button>
    <a data-test-id="Button-primary-md" class="dk-sbol-button dk-sbol-button_type_primary dk-sbol-button_size_md dk-sbol-button_inline dk-sbol-controls__button-with-icon dk-sbol-controls__button-with-icon_isWhiteSvg" href="https://www.sberbank.com/sms/adskids-website" target="_blank" tabindex="0"><span class="dk-sbol-button__content"><span class="dk-sbol-icon dk-sbol-icon_size_md" aria-hidden="true" tabindex="-1"></span><span class="dk-sbol-button__text dk-sbol-button__text_size_md dk-sbol-button__text_iconPosition_left">Продолжить</span></span></a>
</div>

</body>
</html>
